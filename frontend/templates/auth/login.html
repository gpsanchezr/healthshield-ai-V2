<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HealthShield AI — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>body{background:linear-gradient(135deg,#1a3a5c,#2980b9);min-height:100vh;display:flex;align-items:center;}.card{border:none;border-radius:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.3)}</style>
</head>
<body>
<div class="container"><div class="row justify-content-center"><div class="col-md-5">
<div class="card p-5">
  <div class="text-center mb-4">
    <i class="bi bi-shield-heart-fill" style="font-size:3rem;color:#1a3a5c"></i>
    <h2 class="fw-bold mt-2" style="color:#1a3a5c">HealthShield AI</h2>
    <p class="text-muted">Plataforma de Analítica Clínica Inteligente</p>
  </div>
  <div id="err" class="alert alert-danger d-none"><i class="bi bi-exclamation-circle me-2"></i><span id="errMsg"></span></div>
  <div class="mb-3">
    <label class="form-label fw-semibold">Usuario</label>
    <div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span>
    <input type="text" id="username" class="form-control form-control-lg" placeholder="admin"></div>
  </div>
  <div class="mb-4">
    <label class="form-label fw-semibold">Contraseña</label>
    <div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span>
    <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••"></div>
  </div>
  <button class="btn btn-primary btn-lg w-100 fw-bold" onclick="login()" id="btn">
    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
  </button>
  <div class="text-center mt-3"><small class="text-muted">Admin por defecto: admin / Admin123!</small></div>
</div>
</div></div></div>
<script>
async function login(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';
  const r=await fetch('/api/auth/login/',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
  const d=await r.json();
  if(r.ok){localStorage.setItem('access_token',d.access);localStorage.setItem('refresh_token',d.refresh);localStorage.setItem('user',JSON.stringify(d.usuario));window.location.href='/dashboard/';}
  else{document.getElementById('errMsg').textContent=d.detail||'Credenciales incorrectas';document.getElementById('err').classList.remove('d-none');btn.disabled=false;btn.innerHTML='<i class="bi bi-box-arrow-in-right me-2"></i>Ingresar';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body></html>
